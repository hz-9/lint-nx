# Sample workflow for building and deploying a Nuxt site to GitHub Pages
#
name: Generate website with @hz-9/docs-build

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
  # schedule:
  #   - cron: '5 20 * * *'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Build job
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9
      - name: Install dependencies
        run: pnpm install
      - name: Run Generate Script
        run: bash ./scripts/generate-pages.sh
      - name: Setup Node for VuePress build
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
      - name: Install VuePress dependencies
        run: |
          cd docs/.vuepress
          npm install
      - name: Build VuePress static site
        run: |
          cd docs/.vuepress
          npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.vuepress/src/.vuepress/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
